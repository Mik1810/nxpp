name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Boost Graph
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-graph-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Determine release version
        id: version
        run: |
          notes_version="$(python3 scripts/extract_release_notes.py --latest-version RELEASE_NOTES.md)"
          changelog_version="$(python3 scripts/extract_release_notes.py --latest-version CHANGELOG.md)"

          if [ "$notes_version" != "$changelog_version" ]; then
            echo "Top versions do not match: RELEASE_NOTES.md has $notes_version but CHANGELOG.md has $changelog_version" >&2
            exit 1
          fi

          tag_name="v$notes_version"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ "${GITHUB_REF_NAME}" != "$tag_name" ]; then
              echo "Pushed tag ${GITHUB_REF_NAME} does not match top documented version $tag_name" >&2
              exit 1
            fi

            echo "mode=tag-push" >> "$GITHUB_OUTPUT"
            echo "should_create_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "mode=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "should_create_tag=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$notes_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        run: |
          python3 scripts/extract_release_notes.py "${{ steps.version.outputs.tag }}" > /tmp/nxpp_release_notes.md

      - name: Build standalone single header
        run: |
          bash scripts/unix/build_single_header.sh

      - name: Run modular formal test suite
        run: |
          bash scripts/unix/run_tests.sh

      - name: Run standalone-header test suite
        run: |
          bash scripts/unix/run_single_header_tests.sh

      - name: Create and push release tag
        if: steps.version.outputs.should_create_tag == 'true'
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Check whether the GitHub release already exists
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release with tested header
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/nxpp.hpp#nxpp.hpp --title "${{ steps.version.outputs.tag }}" --notes-file /tmp/nxpp_release_notes.md

      - name: Publish release summary
        if: always()
        run: |
          {
            echo "## Release Automation"
            echo
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Tag: \`${{ steps.version.outputs.tag }}\`"
            echo "- Trigger mode: \`${{ steps.version.outputs.mode }}\`"
            if [ "${{ steps.version.outputs.should_create_tag }}" = "true" ]; then
              echo "- Tag handling: created and pushed the matching tag after the release checks passed"
            else
              echo "- Tag handling: used the pushed tag that triggered the workflow"
            fi
            if [ "${{ steps.release_state.outputs.should_publish }}" = "true" ]; then
              echo "- Release publication: created the GitHub release from the tested artifacts"
            else
              echo "- Release publication: skipped because the GitHub release already exists"
            fi
            echo "- Release notes source: \`RELEASE_NOTES.md\`"
            echo "- Header build: \`bash scripts/unix/build_single_header.sh\`"
            echo "- Modular tests: \`bash scripts/unix/run_tests.sh\`"
            echo "- Header test suite: \`bash scripts/unix/run_single_header_tests.sh\`"
            echo "- Release asset: tested \`dist/nxpp.hpp\` published as \`nxpp.hpp\` when a new release is created"
          } >> "$GITHUB_STEP_SUMMARY"
