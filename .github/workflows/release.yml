name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Boost Graph
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-graph-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Determine release version
        id: version
        run: |
          notes_version="$(python3 scripts/extract_release_notes.py --latest-version RELEASE_NOTES.md)"
          changelog_version="$(python3 scripts/extract_release_notes.py --latest-version CHANGELOG.md)"

          if [ "$notes_version" != "$changelog_version" ]; then
            echo "Top versions do not match: RELEASE_NOTES.md has $notes_version but CHANGELOG.md has $changelog_version" >&2
            exit 1
          fi

          echo "version=$notes_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$notes_version" >> "$GITHUB_OUTPUT"

      - name: Check whether the release tag already exists
        id: release_state
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        if: steps.release_state.outputs.should_release == 'true'
        run: |
          python3 scripts/extract_release_notes.py "${{ steps.version.outputs.tag }}" > /tmp/nxpp_release_notes.md

      - name: Build standalone single header
        if: steps.release_state.outputs.should_release == 'true'
        run: |
          bash scripts/build_single_header.sh

      - name: Run modular formal test suite
        if: steps.release_state.outputs.should_release == 'true'
        run: |
          bash scripts/run_tests.sh

      - name: Run standalone-header test suite
        if: steps.release_state.outputs.should_release == 'true'
        run: |
          bash scripts/run_single_header_tests.sh

      - name: Create and push release tag
        if: steps.release_state.outputs.should_release == 'true'
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release with tested header
        if: steps.release_state.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/nxpp.hpp#nxpp.hpp --title "${{ steps.version.outputs.tag }}" --notes-file /tmp/nxpp_release_notes.md

      - name: Publish release summary
        if: always()
        run: |
          {
            echo "## Release Automation"
            echo
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Tag: \`${{ steps.version.outputs.tag }}\`"
            if [ "${{ steps.release_state.outputs.should_release }}" = "true" ]; then
              echo "- Mode: read the top version from \`RELEASE_NOTES.md\` and \`CHANGELOG.md\`, built and tested the release, then created and pushed the matching tag and GitHub release in the same run"
            else
              echo "- Mode: no-op because tag \`${{ steps.version.outputs.tag }}\` already exists"
            fi
            echo "- Release notes source: \`RELEASE_NOTES.md\`"
            echo "- Header build: \`bash scripts/build_single_header.sh\`"
            echo "- Modular tests: \`bash scripts/run_tests.sh\`"
            echo "- Header test suite: \`bash scripts/run_single_header_tests.sh\`"
            if [ "${{ steps.release_state.outputs.should_release }}" = "true" ]; then
              echo "- Release asset: created GitHub release with tested \`nxpp.hpp\`"
            else
              echo "- Release asset: skipped because the release already exists"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
