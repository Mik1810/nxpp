name: Tests

on:
  push:
  pull_request:

jobs:
  test-suite:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev
          - os: ubuntu-latest
            compiler: clang++
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev clang
          - os: macos-latest
            compiler: clang++
            install_boost: brew install boost

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Boost Graph
        run: |
          ${{ matrix.install_boost }}

      - name: Run test suite
        id: tests
        env:
          CXX: ${{ matrix.compiler }}
        run: |
          set +e
          bash scripts/run_tests.sh | tee test-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish test summary
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        run: |
          if [ "${TEST_EXIT_CODE:-1}" = "0" ]; then
            status_word="SUCCESS"
          else
            status_word="FAILURE"
          fi

          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Formal Test Suite"
            echo
            echo "- Runner: \`${{ matrix.os }}\`"
            echo "- Compiler: \`${{ matrix.compiler }}\`"
            echo "- Status: ${status_word}"
            echo "- Command: \`bash scripts/run_tests.sh\`"
            echo
            echo "### Output"
            echo
            echo '```text'
            cat test-output-clean.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
