name: Tests

on:
  push:
  pull_request:

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Boost Graph
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-graph-dev

      - name: Run test suite
        id: tests
        run: |
          set +e
          bash scripts/run_tests.sh | tee test-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish test summary
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        run: |
          if [ "${TEST_EXIT_CODE:-1}" = "0" ]; then
            status_word="SUCCESS"
          else
            status_word="FAILURE"
          fi

          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Formal Test Suite"
            echo
            echo "- Status: ${status_word}"
            echo "- Command: \`bash scripts/run_tests.sh\`"
            echo
            echo "### Output"
            echo
            echo '```text'
            cat test-output-clean.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
