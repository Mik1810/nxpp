name: Snippet Review

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  snippets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip networkx

      - name: Run snippet review
        shell: bash
        run: |
          set -uo pipefail

          overall_status=0
          summary_file="$(mktemp)"

          {
            echo "## Snippet Review"
            echo
            echo "| Snippet | Result |"
            echo "|---|---|"
          } > "$summary_file"

          for dir in snippet/*/; do
            snippet_name="$(basename "$dir")"
            echo "Running snippet review for $snippet_name"

            if bash scripts/test_single_snippet.sh "$snippet_name"; then
              echo "| \`$snippet_name\` | PASS |" >> "$summary_file"
            else
              echo "| \`$snippet_name\` | FAIL |" >> "$summary_file"
              latest_run_dir="$(ls -dt logs/snippet/${snippet_name}_* 2>/dev/null | head -n 1 || true)"
              if [[ -n "$latest_run_dir" && -f "$latest_run_dir/run.log" ]]; then
                echo "::group::${snippet_name} failure log"
                sed -n '1,220p' "$latest_run_dir/run.log"
                echo "::endgroup::"
              fi
              overall_status=1
            fi
          done

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$overall_status" -ne 0 ]]; then
            exit 1
          fi
