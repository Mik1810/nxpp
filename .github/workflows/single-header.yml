name: Single Header

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-single-header:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Boost Graph
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-graph-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build standalone single header
        run: |
          bash scripts/build_single_header.sh

      - name: Run standalone-header test suite before release upload
        if: github.event_name == 'release'
        run: |
          bash scripts/run_single_header_tests.sh

      - name: Smoke test generated header
        run: |
          cat > /tmp/nxpp_single_header_smoke.cpp <<'EOF'
          #include <iostream>
          #include "${{ github.workspace }}/dist/nxpp.hpp"

          int main() {
              nxpp::DiGraph graph;
              graph.add_edge("A", "B", 2.0);
              std::cout << graph.get_edge_weight("A", "B") << "\n";
          }
          EOF

          g++ -std=c++20 -Wall -Wextra -pedantic -O0 /tmp/nxpp_single_header_smoke.cpp -o /tmp/nxpp_single_header_smoke
          /tmp/nxpp_single_header_smoke > /tmp/nxpp_single_header_output.txt
          grep -qx '2' /tmp/nxpp_single_header_output.txt

      - name: Upload standalone single header
        uses: actions/upload-artifact@v4
        with:
          name: nxpp-single-header
          path: dist/nxpp.hpp

      - name: Upload tested header to release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/nxpp.hpp#nxpp.hpp --clobber

      - name: Publish single-header summary
        if: always()
        run: |
          {
            echo "## Standalone Single Header"
            echo
            echo "- Command: \`bash scripts/build_single_header.sh\`"
            echo "- Output: \`dist/nxpp.hpp\`"
            echo "- Smoke test: compiled and executed a small program against the generated header"
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "- Test suite: ran \`bash scripts/run_single_header_tests.sh\` against \`dist/nxpp.hpp\` before uploading the release asset"
              echo "- Release asset: uploaded the tested header to release \`${{ github.event.release.tag_name }}\` as \`nxpp.hpp\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
