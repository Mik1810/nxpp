name: Compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-suite:
    name: test-suite (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu-gcc
            compiler: g++
            platform_family: unix
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: ubuntu-latest
            label: ubuntu-clang
            compiler: clang++
            platform_family: unix
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev clang
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: macos-latest
            label: macos-clang
            compiler: clang++
            platform_family: unix
            install_boost: brew install boost
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: windows-latest
            label: windows-msvc
            compiler: cl
            platform_family: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Boost Graph
        if: matrix.platform_family == 'unix'
        shell: bash
        run: |
          ${{ matrix.install_boost }}

      - name: Export macOS Boost include path
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "NXPP_BOOST_INCLUDE=-I$(brew --prefix boost)/include" >> "$GITHUB_ENV"

      - name: Cache Boost archive and extract
        if: matrix.platform_family == 'windows'
        id: boost_cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.temp }}\boost_1_90_0.zip
            ${{ runner.temp }}\boost_1_90_0
          key: windows-msvc-boost-1_90_0-v1

      - name: Download and extract Boost
        if: matrix.platform_family == 'windows'
        shell: pwsh
        run: |
          $boostZip = Join-Path $env:RUNNER_TEMP "boost_1_90_0.zip"
          $boostRoot = Join-Path $env:RUNNER_TEMP "boost_1_90_0"
          $cacheHit = "${{ steps.boost_cache.outputs.cache-hit }}"

          "NXPP_BOOST_CACHE_HIT=$cacheHit" >> $env:GITHUB_ENV

          if ((Test-Path $boostRoot) -and $cacheHit -eq "true") {
            Write-Host "Using cached extracted Boost tree at $boostRoot"
          } else {
            if (-not (Test-Path $boostZip)) {
              Invoke-WebRequest `
                -Uri "https://archives.boost.io/release/1.90.0/source/boost_1_90_0.zip" `
                -OutFile $boostZip
            }

            if (-not (Test-Path $boostRoot)) {
              $tarCmd = Get-Command tar -ErrorAction SilentlyContinue

              if ($null -ne $tarCmd) {
                & $tarCmd.Source -xf $boostZip -C $env:RUNNER_TEMP
                if ($LASTEXITCODE -ne 0) {
                  throw "tar extraction failed with exit code $LASTEXITCODE"
                }
              } else {
                Expand-Archive -Path $boostZip -DestinationPath $env:RUNNER_TEMP
              }
            }
          }

          if (-not (Test-Path $boostRoot)) {
            throw "Boost root directory was not prepared at $boostRoot"
          }

          if (-not (Test-Path (Join-Path $boostRoot "boost"))) {
            throw "Boost headers were not found under $boostRoot"
          }

          "BOOST_ROOT=$boostRoot" >> $env:GITHUB_ENV
          "NXPP_EXTRA_INCLUDE=$boostRoot" >> $env:GITHUB_ENV
          "CXX=${{ matrix.compiler }}" >> $env:GITHUB_ENV

      - name: Initialize MSVC environment
        if: matrix.platform_family == 'windows'
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) {
            throw 'vswhere.exe was not found on the GitHub Actions Windows runner.'
          }

          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($vsInstallPath)) {
            throw 'Unable to locate a Visual Studio installation with C++ tools via vswhere.'
          }

          $vsInstallPath = $vsInstallPath.Trim()
          $vsDevCmd = Join-Path $vsInstallPath 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat was not found under $vsInstallPath."
          }

          $envDump = cmd.exe /c "`"$vsDevCmd`" -arch=amd64 -host_arch=amd64 >nul && set"
          if ($LASTEXITCODE -ne 0) {
            throw "VsDevCmd.bat failed with exit code $LASTEXITCODE"
          }

          foreach ($line in $envDump) {
            if ($line -match '^(PATH|INCLUDE|LIB|LIBPATH|VCToolsInstallDir|VSINSTALLDIR)=(.*)$') {
              Add-Content -Path $env:GITHUB_ENV -Value $line
            }
          }

      - name: Run test suite
        if: matrix.platform_family == 'unix'
        id: tests
        env:
          CXX: ${{ matrix.compiler }}
        shell: bash
        run: |
          set +e
          export CXXFLAGS="${{ matrix.cxxflags }} ${NXPP_BOOST_INCLUDE:-}"
          bash scripts/unix/run_tests.sh | tee test-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run test suite
        if: matrix.platform_family == 'windows'
        id: tests_windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          & "$env:GITHUB_WORKSPACE\scripts\windows\run_tests.ps1" 2>&1 | Tee-Object -FilePath test-output.txt
          $status = $LASTEXITCODE
          "exit_code=$status" >> $env:GITHUB_OUTPUT
          exit $status

      - name: Publish test summary
        if: always() && matrix.platform_family == 'unix'
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        shell: bash
        run: |
          if [ "${TEST_EXIT_CODE:-1}" = "0" ]; then
            status_word="SUCCESS"
          else
            status_word="FAILURE"
          fi

          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Compatibility Matrix"
            echo
            echo "- Label: \`${{ matrix.label }}\`"
            echo "- Runner: \`${{ matrix.os }}\`"
            echo "- Compiler: \`${{ matrix.compiler }}\`"
            cxxflags="${{ matrix.cxxflags }} ${NXPP_BOOST_INCLUDE:-}"
            cxxflags="$(printf '%s' "$cxxflags" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"
            if [ -n "$cxxflags" ]; then
              echo "- CXXFLAGS: \`$cxxflags\`"
            fi
            echo "- Status: ${status_word}"
            echo "- Command: \`bash scripts/unix/run_tests.sh\`"
            echo
            echo "### Output"
            echo
            echo '```text'
            cat test-output-clean.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test summary
        if: always() && matrix.platform_family == 'windows'
        shell: pwsh
        env:
          TEST_EXIT_CODE: ${{ steps.tests_windows.outputs.exit_code }}
        run: |
          if ($env:TEST_EXIT_CODE -eq "0") {
            $statusWord = "SUCCESS"
          } else {
            $statusWord = "FAILURE"
          }

          $ansiRegex = [regex]"`e\[[0-9;]*[A-Za-z]"
          if (Test-Path test-output.txt) {
            $cleanOutput = $ansiRegex.Replace((Get-Content -Raw -Path test-output.txt), "")
            Set-Content -Path test-output-clean.txt -Value $cleanOutput -NoNewline
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Compatibility Matrix'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Label: windows-msvc'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Runner: windows-latest'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Build path: PowerShell + cl + Boost zip include path'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Boost cache hit: $env:NXPP_BOOST_CACHE_HIT"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Status: $statusWord"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Command: pwsh -File scripts/windows/run_tests.ps1'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Output'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          if (Test-Path test-output-clean.txt) {
            Get-Content test-output-clean.txt | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'No test output was captured because the job failed before the test step completed.'
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'

  large-graph-compare:
    name: large-graph-compare (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Boost Graph
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-graph-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run large-graph comparison against modular headers
        id: modular
        run: |
          set +e
          bash scripts/unix/run_large_graph_compare.sh | tee large-graph-modular-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build standalone single header
        if: success()
        run: |
          bash scripts/unix/build_single_header.sh

      - name: Run large-graph comparison against dist/nxpp.hpp
        if: success()
        id: single_header
        run: |
          set +e
          env NXPP_HEADER_UNDER_TEST=dist/nxpp.hpp bash scripts/unix/run_large_graph_compare.sh | tee large-graph-single-header-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish large-graph comparison summary
        if: always()
        env:
          MODULAR_EXIT_CODE: ${{ steps.modular.outputs.exit_code }}
          SINGLE_HEADER_EXIT_CODE: ${{ steps.single_header.outputs.exit_code }}
        run: |
          status_word() {
            if [ "${1:-1}" = "0" ]; then
              echo "SUCCESS"
            else
              echo "FAILURE"
            fi
          }

          if [ -f large-graph-modular-output.txt ]; then
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' large-graph-modular-output.txt > large-graph-modular-output-clean.txt
          fi

          if [ -f large-graph-single-header-output.txt ]; then
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' large-graph-single-header-output.txt > large-graph-single-header-output-clean.txt
          fi

          {
            echo "## Large-Graph Comparison"
            echo
            echo "- Modular header run: $(status_word "${MODULAR_EXIT_CODE:-1}")"
            echo "- Single-header run: $(status_word "${SINGLE_HEADER_EXIT_CODE:-1}")"
            echo "- Modular command: \`bash scripts/unix/run_large_graph_compare.sh\`"
            echo "- Single-header command: \`env NXPP_HEADER_UNDER_TEST=dist/nxpp.hpp bash scripts/unix/run_large_graph_compare.sh\`"
            echo
            if [ -f large-graph-modular-output-clean.txt ]; then
              echo "### Modular Output"
              echo
              echo '```text'
              cat large-graph-modular-output-clean.txt
              echo '```'
              echo
            fi
            if [ -f large-graph-single-header-output-clean.txt ]; then
              echo "### Single-Header Output"
              echo
              echo '```text'
              cat large-graph-single-header-output-clean.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
