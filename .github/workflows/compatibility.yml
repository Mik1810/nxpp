name: Compatibility

on:
  push:
  pull_request:

jobs:
  test-suite:
    name: test-suite (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu-gcc
            compiler: g++
            shell: bash
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: ubuntu-latest
            label: ubuntu-clang
            compiler: clang++
            shell: bash
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev clang
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: macos-latest
            label: macos-clang
            compiler: clang++
            shell: bash
            install_boost: brew install boost
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Boost Graph
        shell: ${{ matrix.shell }}
        run: |
          ${{ matrix.install_boost }}

      - name: Export macOS Boost include path
        if: runner.os == 'macOS'
        shell: ${{ matrix.shell }}
        run: |
          echo "NXPP_BOOST_INCLUDE=-I$(brew --prefix boost)/include" >> "$GITHUB_ENV"

      - name: Run test suite
        id: tests
        env:
          CXX: ${{ matrix.compiler }}
          CXXFLAGS: ${{ matrix.cxxflags }} ${{ env.NXPP_BOOST_INCLUDE }}
        shell: ${{ matrix.shell }}
        run: |
          set +e
          bash scripts/run_tests.sh | tee test-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish test summary
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        shell: ${{ matrix.shell }}
        run: |
          if [ "${TEST_EXIT_CODE:-1}" = "0" ]; then
            status_word="SUCCESS"
          else
            status_word="FAILURE"
          fi

          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Compatibility Matrix"
            echo
            echo "- Label: \`${{ matrix.label }}\`"
            echo "- Runner: \`${{ matrix.os }}\`"
            echo "- Compiler: \`${{ matrix.compiler }}\`"
            if [ -n "${{ matrix.cxxflags }}${{ env.NXPP_BOOST_INCLUDE }}" ]; then
              echo "- CXXFLAGS: \`${{ matrix.cxxflags }} ${{ env.NXPP_BOOST_INCLUDE }}\`"
            fi
            echo "- Status: ${status_word}"
            echo "- Command: \`bash scripts/run_tests.sh\`"
            echo
            echo "### Output"
            echo
            echo '```text'
            cat test-output-clean.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  windows-native:
    name: test-suite (windows-msvc)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up vcpkg and Boost Graph
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install boost-graph:x64-windows

      - name: Configure CMake test build
        shell: pwsh
        run: |
          cmake -S . -B build-windows `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DNXPP_BUILD_TESTS=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake"

      - name: Build CMake tests
        shell: pwsh
        run: |
          cmake --build build-windows --config Debug

      - name: Run CTest
        id: tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          ctest --test-dir build-windows -C Debug --output-on-failure 2>&1 | Tee-Object -FilePath test-output.txt
          $status = $LASTEXITCODE
          "exit_code=$status" >> $env:GITHUB_OUTPUT
          exit $status

      - name: Publish test summary
        if: always()
        shell: pwsh
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        run: |
          if ($env:TEST_EXIT_CODE -eq "0") {
            $statusWord = "SUCCESS"
          } else {
            $statusWord = "FAILURE"
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Compatibility Matrix"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Label: `windows-msvc`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Runner: `windows-latest`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build path: `CMake + vcpkg + Visual Studio 2022`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Status: $statusWord"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Command: `ctest --test-dir build-windows -C Debug --output-on-failure`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Output"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          if (Test-Path test-output.txt) {
            Get-Content test-output.txt | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "No ctest output was captured because the job failed before the test step completed."
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
