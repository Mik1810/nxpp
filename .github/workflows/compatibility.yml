name: Compatibility

on:
  push:
  pull_request:

jobs:
  test-suite:
    name: test-suite (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu-gcc
            compiler: g++
            platform_family: unix
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: ubuntu-latest
            label: ubuntu-clang
            compiler: clang++
            platform_family: unix
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev clang
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: macos-latest
            label: macos-clang
            compiler: clang++
            platform_family: unix
            install_boost: brew install boost
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: windows-latest
            label: windows-msvc
            compiler: cl
            platform_family: windows
            scope: smoke

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Boost Graph
        if: matrix.platform_family == 'unix'
        shell: bash
        run: |
          ${{ matrix.install_boost }}

      - name: Export macOS Boost include path
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "NXPP_BOOST_INCLUDE=-I$(brew --prefix boost)/include" >> "$GITHUB_ENV"

      - name: Cache Boost archive and extract
        if: matrix.platform_family == 'windows'
        id: boost_cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}\boost_1_90_0.zip
            ${{ runner.temp }}\boost_1_90_0
          key: windows-msvc-boost-1_90_0-v1

      - name: Download and extract Boost
        if: matrix.platform_family == 'windows'
        shell: pwsh
        run: |
          $boostZip = Join-Path $env:RUNNER_TEMP "boost_1_90_0.zip"
          $boostRoot = Join-Path $env:RUNNER_TEMP "boost_1_90_0"
          $cacheHit = "${{ steps.boost_cache.outputs.cache-hit }}"

          "NXPP_BOOST_CACHE_HIT=$cacheHit" >> $env:GITHUB_ENV

          if ((Test-Path $boostRoot) -and $cacheHit -eq "true") {
            Write-Host "Using cached extracted Boost tree at $boostRoot"
          } else {
            if (-not (Test-Path $boostZip)) {
              Invoke-WebRequest `
                -Uri "https://archives.boost.io/release/1.90.0/source/boost_1_90_0.zip" `
                -OutFile $boostZip
            }

            if (-not (Test-Path $boostRoot)) {
              $tarCmd = Get-Command tar -ErrorAction SilentlyContinue

              if ($null -ne $tarCmd) {
                & $tarCmd.Source -xf $boostZip -C $env:RUNNER_TEMP
                if ($LASTEXITCODE -ne 0) {
                  throw "tar extraction failed with exit code $LASTEXITCODE"
                }
              } else {
                Expand-Archive -Path $boostZip -DestinationPath $env:RUNNER_TEMP
              }
            }
          }

          if (-not (Test-Path $boostRoot)) {
            throw "Boost root directory was not prepared at $boostRoot"
          }

          if (-not (Test-Path (Join-Path $boostRoot "boost"))) {
            throw "Boost headers were not found under $boostRoot"
          }

          "BOOST_ROOT=$boostRoot" >> $env:GITHUB_ENV
          "NXPP_EXTRA_INCLUDE=$boostRoot" >> $env:GITHUB_ENV
          "CXX=${{ matrix.compiler }}" >> $env:GITHUB_ENV

      - name: Run test suite
        if: matrix.platform_family == 'unix'
        id: tests
        env:
          CXX: ${{ matrix.compiler }}
          CXXFLAGS: ${{ matrix.cxxflags }} ${{ env.NXPP_BOOST_INCLUDE }}
        shell: bash
        run: |
          set +e
          bash scripts/unix/run_tests.sh | tee test-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run test suite
        if: matrix.platform_family == 'windows'
        id: tests_windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          & "$env:GITHUB_WORKSPACE\scripts\windows\run_tests.ps1" -Smoke 2>&1 | Tee-Object -FilePath test-output.txt
          $status = $LASTEXITCODE
          "exit_code=$status" >> $env:GITHUB_OUTPUT
          exit $status

      - name: Publish test summary
        if: always() && matrix.platform_family == 'unix'
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        shell: bash
        run: |
          if [ "${TEST_EXIT_CODE:-1}" = "0" ]; then
            status_word="SUCCESS"
          else
            status_word="FAILURE"
          fi

          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Compatibility Matrix"
            echo
            echo "- Label: \`${{ matrix.label }}\`"
            echo "- Runner: \`${{ matrix.os }}\`"
            echo "- Compiler: \`${{ matrix.compiler }}\`"
            if [ -n "${{ matrix.cxxflags }}${{ env.NXPP_BOOST_INCLUDE }}" ]; then
              echo "- CXXFLAGS: \`${{ matrix.cxxflags }} ${{ env.NXPP_BOOST_INCLUDE }}\`"
            fi
            echo "- Status: ${status_word}"
            echo "- Command: \`bash scripts/unix/run_tests.sh\`"
            echo
            echo "### Output"
            echo
            echo '```text'
            cat test-output-clean.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test summary
        if: always() && matrix.platform_family == 'windows'
        shell: pwsh
        env:
          TEST_EXIT_CODE: ${{ steps.tests_windows.outputs.exit_code }}
        run: |
          if ($env:TEST_EXIT_CODE -eq "0") {
            $statusWord = "SUCCESS"
          } else {
            $statusWord = "FAILURE"
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Compatibility Matrix"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Label: `windows-msvc`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Runner: `windows-latest`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build path: `PowerShell + cl + Boost zip include path`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Boost cache hit: `$env:NXPP_BOOST_CACHE_HIT`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Scope: `smoke subset (test_core, test_edge_cases)`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Status: $statusWord"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Command: `pwsh -File scripts/windows/run_tests.ps1 -Smoke`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Output"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          if (Test-Path test-output.txt) {
            Get-Content test-output.txt | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "No ctest output was captured because the job failed before the test step completed."
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
