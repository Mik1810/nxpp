name: Compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-suite:
    name: test-suite (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu-gcc-boost-1.74.0
            compiler: g++
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: ubuntu-latest
            label: ubuntu-clang-boost-1.74.0
            compiler: clang++
            install_compiler: sudo apt-get update && sudo apt-get install -y clang
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install compiler extras
        if: matrix.install_compiler
        shell: bash
        run: |
          ${{ matrix.install_compiler }}

      - name: Cache Boost 1.74.0 archive and extract
        id: boost_cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.temp }}/boost_1_74_0.tar.bz2
            ${{ runner.temp }}/boost_1_74_0
          key: unix-boost-1_74_0-v1

      - name: Download and extract Boost 1.74.0
        shell: bash
        run: |
          set -euo pipefail
          boost_archive="${RUNNER_TEMP}/boost_1_74_0.tar.bz2"
          boost_root="${RUNNER_TEMP}/boost_1_74_0"
          cache_hit="${{ steps.boost_cache.outputs.cache-hit }}"

          echo "NXPP_BOOST_CACHE_HIT=${cache_hit}" >> "$GITHUB_ENV"

          if [ -d "$boost_root/boost" ] && [ "$cache_hit" = "true" ]; then
            echo "Using cached extracted Boost tree at $boost_root"
          else
            if [ ! -f "$boost_archive" ]; then
              curl -L https://archives.boost.io/release/1.74.0/source/boost_1_74_0.tar.bz2 -o "$boost_archive"
            fi

            if [ ! -d "$boost_root/boost" ]; then
              tar -xf "$boost_archive" -C "$RUNNER_TEMP"
            fi
          fi

          if [ ! -d "$boost_root/boost" ]; then
            echo "Boost headers were not prepared at $boost_root" >&2
            exit 1
          fi

          echo "NXPP_BOOST_INCLUDE=-I$boost_root" >> "$GITHUB_ENV"

      - name: Run test suite
        id: tests
        env:
          CXX: ${{ matrix.compiler }}
        shell: bash
        run: |
          set +e
          export CXXFLAGS="${{ matrix.cxxflags }} ${NXPP_BOOST_INCLUDE:-}"
          bash scripts/unix/run_tests.sh | tee test-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish test summary
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        shell: bash
        run: |
          if [ "${TEST_EXIT_CODE:-1}" = "0" ]; then
            status_word="SUCCESS"
          else
            status_word="FAILURE"
          fi

          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Compatibility Matrix"
            echo
            echo "- Label: \`${{ matrix.label }}\`"
            echo "- Runner: \`${{ matrix.os }}\`"
            echo "- Compiler: \`${{ matrix.compiler }}\`"
            echo "- Boost baseline: \`1.74.0\`"
            echo "- Boost cache hit: \`${NXPP_BOOST_CACHE_HIT:-false}\`"
            cxxflags="${{ matrix.cxxflags }} ${NXPP_BOOST_INCLUDE:-}"
            cxxflags="$(printf '%s' "$cxxflags" | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"
            if [ -n "$cxxflags" ]; then
              echo "- CXXFLAGS: \`$cxxflags\`"
            fi
            echo "- Status: ${status_word}"
            echo "- Command: \`bash scripts/unix/run_tests.sh\`"
            echo
            echo "### Output"
            echo
            echo '```text'
            cat test-output-clean.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  large-graph-compare:
    name: large-graph-compare (ubuntu, boost 1.74.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Boost 1.74.0 archive and extract
        id: boost_cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.temp }}/boost_1_74_0.tar.bz2
            ${{ runner.temp }}/boost_1_74_0
          key: unix-boost-1_74_0-v1

      - name: Download and extract Boost 1.74.0
        shell: bash
        run: |
          set -euo pipefail
          boost_archive="${RUNNER_TEMP}/boost_1_74_0.tar.bz2"
          boost_root="${RUNNER_TEMP}/boost_1_74_0"
          cache_hit="${{ steps.boost_cache.outputs.cache-hit }}"

          echo "NXPP_BOOST_CACHE_HIT=${cache_hit}" >> "$GITHUB_ENV"

          if [ -d "$boost_root/boost" ] && [ "$cache_hit" = "true" ]; then
            echo "Using cached extracted Boost tree at $boost_root"
          else
            if [ ! -f "$boost_archive" ]; then
              curl -L https://archives.boost.io/release/1.74.0/source/boost_1_74_0.tar.bz2 -o "$boost_archive"
            fi

            if [ ! -d "$boost_root/boost" ]; then
              tar -xf "$boost_archive" -C "$RUNNER_TEMP"
            fi
          fi

          if [ ! -d "$boost_root/boost" ]; then
            echo "Boost headers were not prepared at $boost_root" >&2
            exit 1
          fi

          echo "NXPP_BOOST_INCLUDE=-I$boost_root" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run large-graph comparison against modular headers
        id: modular
        run: |
          set +e
          env CXXFLAGS="${NXPP_BOOST_INCLUDE:-}" bash scripts/unix/run_large_graph_compare.sh | tee large-graph-modular-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build standalone single header
        if: success()
        run: |
          bash scripts/unix/build_single_header.sh

      - name: Run large-graph comparison against dist/nxpp.hpp
        if: success()
        id: single_header
        run: |
          set +e
          env NXPP_HEADER_UNDER_TEST=dist/nxpp.hpp CXXFLAGS="${NXPP_BOOST_INCLUDE:-}" bash scripts/unix/run_large_graph_compare.sh | tee large-graph-single-header-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish large-graph comparison summary
        if: always()
        env:
          MODULAR_EXIT_CODE: ${{ steps.modular.outputs.exit_code }}
          SINGLE_HEADER_EXIT_CODE: ${{ steps.single_header.outputs.exit_code }}
        run: |
          status_word() {
            if [ "${1:-1}" = "0" ]; then
              echo "SUCCESS"
            else
              echo "FAILURE"
            fi
          }

          if [ -f large-graph-modular-output.txt ]; then
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' large-graph-modular-output.txt > large-graph-modular-output-clean.txt
          fi

          if [ -f large-graph-single-header-output.txt ]; then
            perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' large-graph-single-header-output.txt > large-graph-single-header-output-clean.txt
          fi

          {
            echo "## Large-Graph Comparison"
            echo
            echo "- Boost baseline: \`1.74.0\`"
            echo "- Boost cache hit: \`${NXPP_BOOST_CACHE_HIT:-false}\`"
            echo "- Modular header run: $(status_word "${MODULAR_EXIT_CODE:-1}")"
            echo "- Single-header run: $(status_word "${SINGLE_HEADER_EXIT_CODE:-1}")"
            echo "- Modular command: \`env CXXFLAGS=\\\"${NXPP_BOOST_INCLUDE:-}\\\" bash scripts/unix/run_large_graph_compare.sh\`"
            echo "- Single-header command: \`env NXPP_HEADER_UNDER_TEST=dist/nxpp.hpp CXXFLAGS=\\\"${NXPP_BOOST_INCLUDE:-}\\\" bash scripts/unix/run_large_graph_compare.sh\`"
            echo
            if [ -f large-graph-modular-output-clean.txt ]; then
              echo "### Modular Output"
              echo
              echo '```text'
              cat large-graph-modular-output-clean.txt
              echo '```'
              echo
            fi
            if [ -f large-graph-single-header-output-clean.txt ]; then
              echo "### Single-Header Output"
              echo
              echo '```text'
              cat large-graph-single-header-output-clean.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
