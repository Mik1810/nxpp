name: Compatibility

on:
  push:
  pull_request:

jobs:
  test-suite:
    name: test-suite (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: ubuntu-gcc
            compiler: g++
            shell: bash
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: ubuntu-latest
            label: ubuntu-clang
            compiler: clang++
            shell: bash
            install_boost: sudo apt-get update && sudo apt-get install -y libboost-graph-dev clang
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: macos-latest
            label: macos-clang
            compiler: clang++
            shell: bash
            install_boost: brew install boost
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0
          - os: windows-latest
            label: windows-ucrt64-gcc
            compiler: g++
            shell: msys2 {0}
            msystem: UCRT64
            install_boost: pacman -S --needed --noconfirm mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-boost
            cxxflags: -std=c++20 -Wall -Wextra -pedantic -O0

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true

      - name: Install Boost Graph
        shell: ${{ matrix.shell }}
        run: |
          ${{ matrix.install_boost }}

      - name: Export macOS Boost include path
        if: runner.os == 'macOS'
        shell: ${{ matrix.shell }}
        run: |
          echo "NXPP_BOOST_INCLUDE=-I$(brew --prefix boost)/include" >> "$GITHUB_ENV"

      - name: Run test suite
        id: tests
        env:
          CXX: ${{ matrix.compiler }}
          CXXFLAGS: ${{ matrix.cxxflags }} ${{ env.NXPP_BOOST_INCLUDE }}
        shell: ${{ matrix.shell }}
        run: |
          set +e
          bash scripts/run_tests.sh | tee test-output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Publish test summary
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        shell: ${{ matrix.shell }}
        run: |
          if [ "${TEST_EXIT_CODE:-1}" = "0" ]; then
            status_word="SUCCESS"
          else
            status_word="FAILURE"
          fi

          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' test-output.txt > test-output-clean.txt

          {
            echo "## Compatibility Matrix"
            echo
            echo "- Label: \`${{ matrix.label }}\`"
            echo "- Runner: \`${{ matrix.os }}\`"
            echo "- Compiler: \`${{ matrix.compiler }}\`"
            if [ -n "${{ matrix.cxxflags }}${{ env.NXPP_BOOST_INCLUDE }}" ]; then
              echo "- CXXFLAGS: \`${{ matrix.cxxflags }} ${{ env.NXPP_BOOST_INCLUDE }}\`"
            fi
            echo "- Status: ${status_word}"
            echo "- Command: \`bash scripts/run_tests.sh\`"
            echo
            echo "### Output"
            echo
            echo '```text'
            cat test-output-clean.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
